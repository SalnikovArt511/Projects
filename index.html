<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks Board</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f5;--surface:#fff;--surface2:#f1f0ec;
  --border:rgba(55,53,47,.12);--border2:rgba(55,53,47,.22);
  --text:#37352f;--text2:#787672;--text3:#aeaca8;
  --accent:#2eaadc;--danger:#e03e3e;--radius:8px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#191919;--surface:#252525;--surface2:#2f2f2f;
  --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);
  --text:#e6e6e3;--text2:#9b9a97;--text3:#6b6968
}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);padding:16px 16px 60px;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.header-title{font-size:20px;font-weight:600}
.header-actions{display:flex;gap:7px;flex-wrap:wrap}
.btn{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.btn:hover{border-color:var(--text3);color:var(--text)}
.btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn.primary:hover{opacity:.85}
.btn.danger{color:var(--danger);border-color:var(--danger)}
.btn.danger:hover{background:var(--danger);color:#fff}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit}
.filter-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.board{display:flex;gap:10px;align-items:flex-start;overflow-x:auto;padding-bottom:10px}
.col{flex:0 0 245px;background:var(--surface2);border-radius:10px;padding:10px}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px}
.col-title{font-size:12px;font-weight:600;color:var(--text2)}
.col-badge{font-size:11px;background:rgba(55,53,47,.08);color:var(--text3);border-radius:10px;padding:1px 7px}
@media(prefers-color-scheme:dark){.col-badge{background:rgba(255,255,255,.07)}}
.card{background:var(--surface);border:1px solid var(--border);border-left:3px solid transparent;border-radius:var(--radius);padding:11px 12px;margin-bottom:7px;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card[data-priority=high]{border-left-color:#e03e3e}
.card[data-priority=medium]{border-left-color:#d9730d}
.card[data-priority=low]{border-left-color:#9b9a97}
.card.hidden{display:none}
.card-name{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:7px}
.col[data-status=done] .card-name{text-decoration:line-through;color:var(--text3)}
.card-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.pill{font-size:10px;padding:2px 7px;border-radius:4px;white-space:nowrap;font-weight:500}
.pill-high{background:#fbe4e4;color:#9b1c1c}
.pill-medium{background:#faebdd;color:#7a3a00}
.pill-low{background:#f1f0ec;color:#6b6968}
.pill-dl{background:var(--surface2);color:var(--text2);font-weight:400}
.pill-dl.hot{background:#fbe4e4;color:#9b1c1c}
@media(prefers-color-scheme:dark){
  .pill-high{background:#3d1515;color:#f98989}
  .pill-medium{background:#3a2000;color:#f5a05a}
  .pill-low{background:#2f2f2f;color:#9b9a97}
  .pill-dl.hot{background:#3d1515;color:#f98989}
}
.subtasks-divider{border:none;border-top:1px solid var(--border);margin:9px 0 7px}
.progress-label{font-size:10px;color:var(--text3);margin-bottom:5px}
.progress-bar-wrap{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:8px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s ease}
.sub{display:flex;align-items:flex-start;gap:7px;padding:3px 0;user-select:none}
.sub-clickable{cursor:pointer}
.sub-clickable:hover .sub-text{color:var(--text)}
.checkbox{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.checkbox.checked{background:var(--accent);border-color:var(--accent)}
.checkbox.checked::after{content:'';display:block;width:4px;height:7px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
.sub-right{flex:1;display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.sub-text{font-size:12px;color:var(--text2);line-height:1.4;transition:all .15s}
.sub-text.done{text-decoration:line-through;color:var(--text3)}
.sub-owner{font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0;padding-top:2px}
.sub-del{font-size:11px;color:var(--danger);cursor:pointer;padding:0 2px;display:none;line-height:1}
.edit-mode .sub-del{display:inline}
.col-empty{font-size:12px;color:var(--text3);text-align:center;padding:16px 0 8px}

/* edit form inside col */
.add-task-form{display:none;background:var(--surface);border:1px dashed var(--border2);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.edit-mode .add-task-form{display:block}
.edit-input{width:100%;font-size:12px;font-family:inherit;border:1px solid var(--border2);border-radius:5px;padding:5px 8px;background:var(--surface);color:var(--text);margin-bottom:6px;outline:none}
.edit-input:focus{border-color:var(--accent)}
.edit-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.edit-select{font-size:12px;font-family:inherit;border:1px solid var(--border2);border-radius:5px;padding:4px 7px;background:var(--surface);color:var(--text);outline:none;cursor:pointer}
/* card edit controls */
.card-controls{display:none;gap:5px;margin-top:8px}
.edit-mode .card-controls{display:flex}
/* add sub */
.add-sub-row{display:none;align-items:center;gap:5px;margin-top:5px}
.edit-mode .add-sub-row{display:flex}
.add-sub-input{flex:1;font-size:12px;font-family:inherit;border:1px solid var(--border2);border-radius:5px;padding:3px 7px;background:var(--surface);color:var(--text);outline:none}
.add-sub-input:focus{border-color:var(--accent)}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Tasks Board</div>
  <div class="header-actions">
    <button class="btn" id="editBtn" onclick="toggleEdit()">✏️ Редактировать</button>
    <button class="btn primary" onclick="exportHtml()">⬇ Скачать HTML</button>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all"       onclick="setFilter('all')">Все</button>
  <button class="filter-btn"        data-filter="Manager"   onclick="setFilter('Manager')">Руководитель</button>
  <button class="filter-btn"        data-filter="Assistant" onclick="setFilter('Assistant')">Ассистент</button>
  <button class="filter-btn"        data-filter="Both"      onclick="setFilter('Both')">Совместно</button>
</div>

<div class="board" id="board"></div>

<script>
let TASKS = [
  {
    id:1,name:"Создать презентацию (short + long version)",
    priority:"high",deadline:"27 мар",deadlineHot:true,
    status:"thisweek",owner:"Assistant",
    subs:[
      {id:11,text:"Выбрать дизайнера",                    done:true, owner:"Ast"},
      {id:12,text:"Согласовать условия и отдать в работу", done:true, owner:"Ast"},
      {id:13,text:"Утвердить финальную версию",            done:false,owner:"Both"},
    ]
  },
  {
    id:2,name:"Аутрич для клиентов (сегмент А/B)",
    priority:"high",deadline:"29 мар",deadlineHot:true,
    status:"thisweek",owner:"Assistant",
    subs:[
      {id:21,text:"Анализ Озон Фарма + промпт для анализа",done:true, owner:"Ast"},
      {id:22,text:"Структура аутрича Озон Фарма + промпт", done:true, owner:"Ast"},
      {id:23,text:"Ветки по компаниям в Claude + Диск",    done:true, owner:"Ast"},
      {id:24,text:"Письма под Амедарт",                   done:true, owner:"Ast"},
      {id:25,text:"Найти контакты ЛПР",                   done:false,owner:"Both"},
    ]
  },
  {
    id:3,name:"AI-система для планирования",
    priority:"medium",deadline:"4 апр",deadlineHot:false,
    status:"thisweek",owner:"Assistant",
    subs:[
      {id:31,text:"Выбрать структуру системы",      done:true, owner:"Ast"},
      {id:32,text:"Создать бэклог",                 done:true, owner:"Ast"},
      {id:33,text:"Настроить ТГ бот + Notion",      done:false,owner:"Ast"},
      {id:34,text:"Подключить Reclaim.ai",          done:false,owner:"Ast"},
      {id:35,text:"Протестировать полный цикл",     done:false,owner:"Both"},
    ]
  },
  {
    id:4,name:"Сделать шаблон NDA",
    priority:"high",deadline:"25 мар",deadlineHot:true,
    status:"inprogress",owner:"Assistant",
    subs:[]
  },
];

const COLS=[
  {key:"inprogress",label:"🔄 In progress"},
  {key:"thisweek",  label:"✅ This week"},
  {key:"inbox",     label:"📥 Inbox"},
  {key:"done",      label:"✔ Done"},
];

let editMode=false;
let currentFilter="all";
let uid=200;

function nid(){return ++uid}
function getTask(id){return TASKS.find(t=>t.id===id)}
function findSub(id){for(const t of TASKS){const s=t.subs.find(s=>s.id===id);if(s)return{t,s}}return null}
function visible(task){
  if(currentFilter==="all")return true;
  if(currentFilter==="Both")return task.owner==="Both";
  return task.owner===currentFilter||task.owner==="Both";
}
function ppill(p){const l={high:"High",medium:"Medium",low:"Low"};return`<span class="pill pill-${p}">${l[p]}</span>`}

function renderCard(task){
  const vis=visible(task)?"":" hidden";
  const subs=task.subs;
  const total=subs.length;
  const done=subs.filter(s=>s.done).length;
  const pct=total?Math.round(done/total*100):0;

  const subsHtml=subs.map(s=>`
    <div class="sub sub-clickable" onclick="toggleSub(${s.id})">
      <div class="checkbox${s.done?" checked":""}"></div>
      <div class="sub-right">
        <span class="sub-text${s.done?" done":""}">${s.text}</span>
        <span class="sub-owner">${s.owner} <span class="sub-del" onclick="event.stopPropagation();delSub(${s.id})">✕</span></span>
      </div>
    </div>`).join("");

  const progressHtml=total?`
    <div class="progress-label">${done}/${total} выполнено</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>`:"";

  const hasSubs=total>0;
  const divider=(hasSubs||editMode)?`<hr class="subtasks-divider">`:"";

  const addSubRow=`
    <div class="add-sub-row">
      <input class="add-sub-input" id="ns_${task.id}" placeholder="+ Подзадача"
             onkeydown="if(event.key==='Enter')addSub(${task.id})">
      <button class="btn" style="font-size:11px;padding:3px 9px" onclick="addSub(${task.id})">Ок</button>
    </div>`;

  const controls=`
    <div class="card-controls">
      <button class="btn" style="font-size:11px;padding:3px 9px" onclick="editCard(${task.id})">✏️ Изменить</button>
      <button class="btn danger" style="font-size:11px;padding:3px 9px" onclick="delTask(${task.id})">Удалить</button>
    </div>`;

  return `<div class="card${vis}" data-priority="${task.priority}">
    <div class="card-name">${task.name}</div>
    <div class="card-meta">
      ${ppill(task.priority)}
      ${task.deadline?`<span class="pill pill-dl${task.deadlineHot?" hot":""}">📅 ${task.deadline}</span>`:""}
    </div>
    ${divider}${progressHtml}${subsHtml}${addSubRow}${controls}
  </div>`;
}

function render(){
  const board=document.getElementById("board");
  board.innerHTML=COLS.map(col=>{
    const tasks=TASKS.filter(t=>t.status===col.key);
    const vc=tasks.filter(visible).length;

    const addForm=`
      <div class="add-task-form">
        <input class="edit-input" id="nt_${col.key}" placeholder="Название задачи"
               onkeydown="if(event.key==='Enter')addTask('${col.key}')">
        <div class="edit-row">
          <select class="edit-select" id="np_${col.key}">
            <option value="high">🔴 High</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="low">⚪ Low</option>
          </select>
          <select class="edit-select" id="no_${col.key}">
            <option value="Manager">Manager</option>
            <option value="Assistant" selected>Assistant</option>
            <option value="Both">Both</option>
          </select>
          <input class="edit-input" id="nd_${col.key}" placeholder="дедлайн" style="margin:0;width:80px">
        </div>
        <button class="btn primary" onclick="addTask('${col.key}')">+ Задача</button>
      </div>`;

    const cards=tasks.map(renderCard).join("")||`<div class="col-empty">Нет задач</div>`;

    return `<div class="col${editMode?" edit-mode":""}" data-status="${col.key}">
      <div class="col-header">
        <span class="col-title">${col.label}</span>
        <span class="col-badge">${vc}</span>
      </div>
      ${addForm}${cards}
    </div>`;
  }).join("");
}

/* ── actions ── */
function toggleSub(id){const r=findSub(id);if(r)r.s.done=!r.s.done;render()}
function delSub(id){const r=findSub(id);if(r)r.t.subs=r.t.subs.filter(s=>s.id!==id);render()}

function addSub(taskId){
  const inp=document.getElementById(`ns_${taskId}`);
  const text=inp?.value.trim();
  if(!text)return;
  const t=getTask(taskId);
  if(t)t.subs.push({id:nid(),text,done:false,owner:"Ast"});
  render();
}

function addTask(status){
  const name=document.getElementById(`nt_${status}`)?.value.trim();
  if(!name)return;
  const priority=document.getElementById(`np_${status}`)?.value||"medium";
  const owner=document.getElementById(`no_${status}`)?.value||"Assistant";
  const deadline=document.getElementById(`nd_${status}`)?.value.trim()||"";
  TASKS.push({id:nid(),name,priority,deadline,deadlineHot:false,status,owner,subs:[]});
  render();
}

function delTask(id){
  if(!confirm("Удалить задачу?"))return;
  TASKS=TASKS.filter(t=>t.id!==id);
  render();
}

function editCard(id){
  const t=getTask(id);if(!t)return;
  const name=prompt("Название:",t.name);
  if(name===null)return;
  if(name.trim())t.name=name.trim();

  const pr=prompt("Приоритет (high / medium / low):",t.priority);
  if(pr&&["high","medium","low"].includes(pr.trim()))t.priority=pr.trim();

  const dl=prompt("Дедлайн (например: 15 апр):",t.deadline||"");
  if(dl!==null){t.deadline=dl.trim();t.deadlineHot=dl.trim()?confirm("Горящий дедлайн? (красный)"):false}

  const st=prompt("Статус (inprogress / thisweek / inbox / done):",t.status);
  if(st&&["inprogress","thisweek","inbox","done"].includes(st.trim()))t.status=st.trim();

  const ow=prompt("Owner (Manager / Assistant / Both):",t.owner);
  if(ow&&["Manager","Assistant","Both"].includes(ow.trim()))t.owner=ow.trim();

  render();
}

function toggleEdit(){
  editMode=!editMode;
  document.getElementById("editBtn").textContent=editMode?"✅ Готово":"✏️ Редактировать";
  render();
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active",b.dataset.filter===f));
  render();
}

/* ── export ── */
function exportHtml(){
  const tasksJson=JSON.stringify(TASKS,null,2);
  const full=document.documentElement.outerHTML;
  const out=full.replace(/let TASKS = \[[\s\S]*?\];/,`let TASKS = ${tasksJson};`);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([out],{type:"text/html"}));
  a.download="kanban.html";a.click();
}

render();
</script>
</body>
</html>
