<html lang="ru"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks Board</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f5;--surface:#fff;--surface2:#f1f0ec;
  --border:rgba(55,53,47,.12);--border2:rgba(55,53,47,.22);
  --text:#37352f;--text2:#787672;--text3:#aeaca8;
  --accent:#2eaadc;--danger:#e03e3e;--radius:8px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#191919;--surface:#252525;--surface2:#2f2f2f;
  --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);
  --text:#e6e6e3;--text2:#9b9a97;--text3:#6b6968
}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);padding:16px 16px 60px;min-height:100vh}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:10px}
.header-title{font-size:20px;font-weight:600}
.header-actions{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.save-status{font-size:11px;color:var(--text3);transition:color .2s}
.save-status.saving{color:var(--accent)}
.save-status.ok{color:#3b7d29}
.save-status.err{color:var(--danger)}
@media(prefers-color-scheme:dark){.save-status.ok{color:#97c459}}

.btn{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.btn:hover{border-color:var(--text3);color:var(--text)}
.btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn.primary:hover{opacity:.85}
.btn.danger{color:var(--danger);border-color:var(--danger)}
.btn.danger:hover{background:var(--danger);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}

.gh-banner{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 14px;margin-bottom:16px;display:none}
.gh-banner.visible{display:block}
.gh-banner-title{font-size:13px;font-weight:500;margin-bottom:8px}
.gh-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.gh-input{font-size:12px;font-family:inherit;border:1px solid var(--border2);border-radius:5px;padding:5px 9px;background:var(--surface);color:var(--text);outline:none;flex:1;min-width:120px}
.gh-input:focus{border-color:var(--accent)}
.gh-hint{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.5}
.gh-hint a{color:var(--accent);text-decoration:none}

.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;margin-top:12px}
.filter-btn{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit}
.filter-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}

.board{display:flex;gap:10px;align-items:flex-start;overflow-x:auto;padding-bottom:10px}
.col{flex:0 0 245px;background:var(--surface2);border-radius:10px;padding:10px}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px}
.col-title{font-size:12px;font-weight:600;color:var(--text2)}
.col-badge{font-size:11px;background:rgba(55,53,47,.08);color:var(--text3);border-radius:10px;padding:1px 7px}
@media(prefers-color-scheme:dark){.col-badge{background:rgba(255,255,255,.07)}}

.card{background:var(--surface);border:1px solid var(--border);border-left:3px solid transparent;border-radius:var(--radius);padding:11px 12px;margin-bottom:7px;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card[data-priority=high]{border-left-color:#e03e3e}
.card[data-priority=medium]{border-left-color:#d9730d}
.card[data-priority=low]{border-left-color:#9b9a97}
.card.hidden{display:none}
.card-name{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:7px}
.col[data-status=done] .card-name{text-decoration:line-through;color:var(--text3)}
.card-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}

.pill{font-size:10px;padding:2px 7px;border-radius:4px;white-space:nowrap;font-weight:500}
.pill-high{background:#fbe4e4;color:#9b1c1c}
.pill-medium{background:#faebdd;color:#7a3a00}
.pill-low{background:#f1f0ec;color:#6b6968}
.pill-dl{background:var(--surface2);color:var(--text2);font-weight:400}
.pill-dl.hot{background:#fbe4e4;color:#9b1c1c}
@media(prefers-color-scheme:dark){
  .pill-high{background:#3d1515;color:#f98989}
  .pill-medium{background:#3a2000;color:#f5a05a}
  .pill-low{background:#2f2f2f;color:#9b9a97}
  .pill-dl.hot{background:#3d1515;color:#f98989}
}

.subtasks-divider{border:none;border-top:1px solid var(--border);margin:9px 0 7px}
.progress-label{font-size:10px;color:var(--text3);margin-bottom:5px}
.progress-bar-wrap{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:8px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.sub{display:flex;align-items:flex-start;gap:7px;padding:3px 0;user-select:none}
.sub-clickable{cursor:pointer}
.sub-clickable:hover .sub-text{color:var(--text)}
.checkbox{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.checkbox.checked{background:var(--accent);border-color:var(--accent)}
.checkbox.checked::after{content:'';display:block;width:4px;height:7px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
.sub-right{flex:1;display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.sub-text{font-size:12px;color:var(--text2);line-height:1.4;transition:all .15s}
.sub-text.done{text-decoration:line-through;color:var(--text3)}
.sub-owner{font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0;padding-top:2px}
.sub-del{font-size:11px;color:var(--danger);cursor:pointer;padding:0 2px;display:none;line-height:1}
.edit-mode .sub-del{display:inline}
.col-empty{font-size:12px;color:var(--text3);text-align:center;padding:16px 0 8px}

.add-task-form{display:none;background:var(--surface);border:1px dashed var(--border2);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.edit-mode .add-task-form{display:block}
.edit-input{width:100%;font-size:12px;font-family:inherit;border:1px solid var(--border2);border-radius:5px;padding:5px 8px;background:var(--surface);color:var(--text);margin-bottom:6px;outline:none}
.edit-input:focus{border-color:var(--accent)}
.edit-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.edit-select{font-size:12px;font-family:inherit;border:1px solid var(--border2);border-radius:5px;padding:4px 7px;background:var(--surface);color:var(--text);outline:none;cursor:pointer}

.add-sub-row{display:none;align-items:center;gap:5px;margin-top:5px}
.edit-mode .add-sub-row{display:flex}
.add-sub-input{flex:1;font-size:12px;font-family:inherit;border:1px solid var(--border2);border-radius:5px;padding:3px 7px;background:var(--surface);color:var(--text);outline:none}
.add-sub-input:focus{border-color:var(--accent)}

/* card controls — edit button only, no move arrows */
.card-controls{display:none;gap:5px;margin-top:9px;align-items:center;flex-wrap:wrap}
.edit-mode .card-controls{display:flex}

/* inline edit panel */
.inline-edit{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.inline-edit.open{display:block}
.ie-row{display:flex;gap:6px;margin-bottom:7px;flex-wrap:wrap;align-items:center}
.ie-label{font-size:11px;color:var(--text3);flex-shrink:0;width:64px}
.ie-input{flex:1;font-size:12px;font-family:inherit;border:1px solid var(--border2);border-radius:5px;padding:4px 8px;background:var(--surface);color:var(--text);outline:none;min-width:80px}
.ie-input:focus{border-color:var(--accent)}
.ie-select{font-size:12px;font-family:inherit;border:1px solid var(--border2);border-radius:5px;padding:4px 7px;background:var(--surface);color:var(--text);outline:none;cursor:pointer;flex:1}
.ie-actions{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
</style>
</head>
<body>

<div class="header">

  <div class="header-actions">

<div class="gh-banner" id="ghBanner">

    Репо: <b>salnikovart511/Projects</b> &nbsp;|&nbsp; Файл: <b>index.html</b>
  </div>
  <div style="display:flex;gap:8px;margin-top:10px">
    <button class="btn primary" onclick="saveGhConfig()">Сохранить настройки</button>

// Колонки: thisweek убран, добавлен plans
const COLS=[
  {key:"inprogress", label:"🔄 In progress"},
  {key:"inbox",      label:"📥 Inbox"},
  {key:"plans",      label:"📋 Plans"},
  {key:"done",       label:"✔ Done"},
];

let editMode=false;
let currentFilter="all";
let uid=200;
let openEditId=null;

function nid(){return ++uid}
function getTask(id){return TASKS.find(t=>t.id===id)}
function findSub(id){for(const t of TASKS){const s=t.subs.find(s=>s.id===id);if(s)return{t,s}}return null}
function visible(task){
  if(currentFilter==="all")return true;
  if(currentFilter==="Both")return task.owner==="Both";
  return task.owner===currentFilter||task.owner==="Both";
}
function ppill(p){const l={high:"High",medium:"Medium",low:"Low"};return`<span class="pill pill-${p}">${l[p]}</span>`}

/* ── inline edit panel — теперь со select статуса вместо стрелок ── */
function inlineEditPanel(task){
  const isOpen = openEditId===task.id;
  const statusOptions = COLS.map(c=>
    `<option value="${c.key}" ${task.status===c.key?"selected":""}>${c.label}</option>`
  ).join("");

  return `
  <div class="inline-edit${isOpen?" open":""}" id="ie_${task.id}">
    <div class="ie-row">
      <span class="ie-label">Название</span>
      <input class="ie-input" id="ie_name_${task.id}" value="${task.name.replace(/"/g,'&quot;')}"
             onkeydown="if(event.key==='Enter')applyEdit(${task.id})">
    </div>
    <div class="ie-row">
      <span class="ie-label">Статус</span>
      <select class="ie-select" id="ie_st_${task.id}">${statusOptions}</select>
    </div>
    <div class="ie-row">
      <span class="ie-label">Приоритет</span>
      <select class="ie-select" id="ie_pr_${task.id}">
        <option value="high"   ${task.priority==="high"   ?"selected":""}>🔴 High</option>
        <option value="medium" ${task.priority==="medium" ?"selected":""}>🟡 Medium</option>
        <option value="low"    ${task.priority==="low"    ?"selected":""}>⚪ Low</option>
      </select>
    </div>
    <div class="ie-row">
      <span class="ie-label">Owner</span>
      <select class="ie-select" id="ie_ow_${task.id}">
        <option value="Manager"   ${task.owner==="Manager"   ?"selected":""}>Manager</option>
        <option value="Assistant" ${task.owner==="Assistant" ?"selected":""}>Assistant</option>
        <option value="Both"      ${task.owner==="Both"      ?"selected":""}>Both</option>
      </select>
    </div>
    <div class="ie-row">
      <span class="ie-label">Дедлайн</span>
      <input class="ie-input" id="ie_dl_${task.id}" value="${task.deadline||""}" placeholder="15 апр"
             onkeydown="if(event.key==='Enter')applyEdit(${task.id})">
      <label style="font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;cursor:pointer;flex-shrink:0">
        <input type="checkbox" id="ie_hot_${task.id}" ${task.deadlineHot?"checked":""} style="cursor:pointer"> горит
      </label>
    </div>
    <div class="ie-actions">
      <button class="btn primary" style="font-size:11px;padding:4px 12px" onclick="applyEdit(${task.id})">Сохранить</button>
      <button class="btn danger"  style="font-size:11px;padding:4px 12px" onclick="delTask(${task.id})">Удалить</button>
      <button class="btn"         style="font-size:11px;padding:4px 12px" onclick="cancelEdit(${task.id})">Отмена</button>

}

function renderCard(task){
  const vis=visible(task)?"":" hidden";
  const subs=task.subs;
  const total=subs.length;
  const doneCount=subs.filter(s=>s.done).length;
  const pct=total?Math.round(doneCount/total*100):0;

  const subsHtml=subs.map(s=>`
    <div class="sub sub-clickable" onclick="toggleSub(${s.id})">
      <div class="checkbox${s.done?" checked":""}"></div>
      <div class="sub-right">
        <span class="sub-text${s.done?" done":""}">${s.text}</span>
        <span class="sub-owner">${s.owner} <span class="sub-del" onclick="event.stopPropagation();delSub(${s.id})">✕</span></span>
      </div>
    </div>`).join("");

  const progressHtml=total?`
    <div class="progress-label">${doneCount}/${total} выполнено</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>`:"";

  const divider=(total>0||editMode)?`<hr class="subtasks-divider">`:"";

  const addSubRow=`
    <div class="add-sub-row">
      <input class="add-sub-input" id="ns_${task.id}" placeholder="+ Подзадача"
             onkeydown="if(event.key==='Enter')addSub(${task.id})">
      <button class="btn" style="font-size:11px;padding:3px 9px" onclick="addSub(${task.id})">Ок</button>
    </div>`;

  // Только кнопка "Изменить" — стрелки убраны, статус меняется через select в редакторе
  const controls=`
    <div class="card-controls">
      <button class="btn" style="font-size:11px;padding:3px 9px" onclick="openEdit(${task.id})">✏️ Изменить</button>
    </div>`;

  return `<div class="card${vis}" data-priority="${task.priority}" id="card_${task.id}">
    <div class="card-name">${task.name}</div>
    <div class="card-meta">
      ${ppill(task.priority)}
      ${task.deadline?`<span class="pill pill-dl${task.deadlineHot?" hot":""}">📅 ${task.deadline}</span>`:""}
    </div>
    ${divider}${progressHtml}${subsHtml}${addSubRow}${controls}
    ${inlineEditPanel(task)}
  </div>`;
}

function render(){
  const board=document.getElementById("board");
  board.innerHTML=COLS.map(col=>{
    const tasks=TASKS.filter(t=>t.status===col.key);
    const vc=tasks.filter(visible).length;

    // select статуса в форме добавления тоже обновлён
    const statusOptions = COLS.map(c=>
      `<option value="${c.key}" ${c.key===col.key?"selected":""}>${c.label}</option>`
    ).join("");

    const addForm=`
      <div class="add-task-form">
        <input class="edit-input" id="nt_${col.key}" placeholder="Название задачи"
               onkeydown="if(event.key==='Enter')addTask('${col.key}')">
        <div class="edit-row">
          <select class="edit-select" id="np_${col.key}">
            <option value="high">🔴 High</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="low">⚪ Low</option>
          </select>
          <select class="edit-select" id="no_${col.key}">
            <option value="Manager">Manager</option>
            <option value="Assistant" selected>Assistant</option>
            <option value="Both">Both</option>
          </select>
          <input class="edit-input" id="nd_${col.key}" placeholder="дедлайн" style="margin:0;width:80px">
        </div>
        <button class="btn primary" onclick="addTask('${col.key}')">+ Задача</button>
      </div>`;

    const cards=tasks.map(renderCard).join("")||`<div class="col-empty">Нет задач</div>`;
    return `<div class="col${editMode?" edit-mode":""}" data-status="${col.key}">
      <div class="col-header">
        <span class="col-title">${col.label}</span>
        <span class="col-badge">${vc}</span>
      </div>
      ${addForm}${cards}
    </div>`;
  }).join("");
}

/* ── actions ── */
function toggleSub(id){const r=findSub(id);if(r)r.s.done=!r.s.done;render()}
function delSub(id){const r=findSub(id);if(r)r.t.subs=r.t.subs.filter(s=>s.id!==id);render()}

function addSub(taskId){
  const inp=document.getElementById(`ns_${taskId}`);
  const text=inp?.value.trim();
  if(!text)return;
  const t=getTask(taskId);
  if(t)t.subs.push({id:nid(),text,done:false,owner:"Ast"});
  render();
}

function addTask(status){
  const name=document.getElementById(`nt_${status}`)?.value.trim();
  if(!name)return;
  const priority=document.getElementById(`np_${status}`)?.value||"medium";
  const owner=document.getElementById(`no_${status}`)?.value||"Assistant";
  const deadline=document.getElementById(`nd_${status}`)?.value.trim()||"";
  TASKS.push({id:nid(),name,priority,deadline,deadlineHot:false,status,owner,subs:[]});
  render();
}

function delTask(id){
  if(!confirm("Удалить задачу?"))return;
  TASKS=TASKS.filter(t=>t.id!==id);
  openEditId=null;
  render();
}

/* ── inline edit ── */
function openEdit(id){
  openEditId=openEditId===id?null:id;
  render();
  if(openEditId===id) setTimeout(()=>document.getElementById(`ie_name_${id}`)?.focus(),50);
}

function cancelEdit(id){
  openEditId=null;
  render();
}

function applyEdit(id){
  const t=getTask(id);if(!t)return;
  const name=document.getElementById(`ie_name_${id}`)?.value.trim();
  if(name) t.name=name;
  const st=document.getElementById(`ie_st_${id}`)?.value;
  if(st) t.status=st;                          // статус меняется → карточка переедет в другую колонку
  const pr=document.getElementById(`ie_pr_${id}`)?.value;
  if(pr) t.priority=pr;
  const ow=document.getElementById(`ie_ow_${id}`)?.value;
  if(ow) t.owner=ow;
  const dl=document.getElementById(`ie_dl_${id}`)?.value.trim();
  t.deadline=dl;
  t.deadlineHot=document.getElementById(`ie_hot_${id}`)?.checked||false;
  openEditId=null;
  render();
}

function toggleEdit(){
  editMode=!editMode;
  openEditId=null;
  document.getElementById("editBtn").textContent=editMode?"✅ Готово":"✏️ Редактировать";
  render();
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active",b.dataset.filter===f));
  render();
}

/* ── github — localStorage с fallback в память (Notion блокирует сторонний storage) ── */
const _mem={};
function lsGet(k){try{return localStorage.getItem(k)||_mem[k]||null;}catch(e){return _mem[k]||null;}}
function lsSet(k,v){_mem[k]=v;try{localStorage.setItem(k,v);}catch(e){}}

function loadGhConfig(){
  document.getElementById("ghToken").value=lsGet("gh_token")||"";
  document.getElementById("ghRepo").value =lsGet("gh_repo")||"salnikovart511/Projects";
  document.getElementById("ghFile").value =lsGet("gh_file")||"index.html";
}
function saveGhConfig(){
  const token=document.getElementById("ghToken").value.trim();
  const repo =document.getElementById("ghRepo").value.trim();
  const file =document.getElementById("ghFile").value.trim();
  if(!token){alert("Вставь GitHub Token");return;}
  lsSet("gh_token",token);
  lsSet("gh_repo",repo);
  lsSet("gh_file",file);
  toggleGhBanner();
  setStatus("Настройки сохранены ✓","ok");
}
function toggleGhBanner(){
  const b=document.getElementById("ghBanner");
  const v=b.classList.toggle("visible");
  if(v)loadGhConfig();
}
function setStatus(msg,cls){
  const el=document.getElementById("saveStatus");
  el.textContent=msg;el.className="save-status "+(cls||"");
  if(cls==="ok")setTimeout(()=>{el.textContent="";el.className="save-status";},3000);
}
async function saveToGitHub(){
  const token=lsGet("gh_token");
  const repo =lsGet("gh_repo")||"salnikovart511/Projects";
  const file =lsGet("gh_file")||"index.html";
  if(!token){toggleGhBanner();setStatus("Введи токен в ⚙️","err");return;}
  const btn=document.getElementById("saveBtn");
  btn.disabled=true;setStatus("Сохраняем…","saving");
  try{
    const url=`https://api.github.com/repos/${repo}/contents/${file}`;
    const h={"Authorization":`Bearer ${token}`,"Accept":"application/vnd.github+json"};
    const getRes=await fetch(url,{headers:h});
    if(!getRes.ok){const e=await getRes.json();throw new Error(e.message||getRes.status);}
    const{sha}=await getRes.json();
    const tasksJson=JSON.stringify(TASKS,null,2);

    // Сбрасываем UI-стейт перед снимком — чтобы файл не открывался
    // в режиме редактирования или с зависшим "Сохраняем…"
    const boardEl = document.getElementById("board");
    const boardSnapshot = boardEl.innerHTML;
    boardEl.innerHTML = "";                                   // очищаем отрендеренную доску
    document.getElementById("saveStatus").textContent = "";
    document.getElementById("saveStatus").className = "save-status";
    document.getElementById("editBtn").textContent = "✏️ Редактировать";
    document.getElementById("saveBtn").disabled = false;
    if(document.getElementById("ghBanner"))
      document.getElementById("ghBanner").classList.remove("visible");

    const newHtml=document.documentElement.outerHTML.replace(
      /let TASKS = \[[\s\S]*?\];/,`let TASKS = ${tasksJson};`
    );

    // Восстанавливаем доску обратно
    boardEl.innerHTML = boardSnapshot;
    const encoded=btoa(unescape(encodeURIComponent(newHtml)));
    const putRes=await fetch(url,{
      method:"PUT",headers:{...h,"Content-Type":"application/json"},
      body:JSON.stringify({message:`update tasks ${new Date().toLocaleString("ru")}`,content:encoded,sha})
    });
    if(!putRes.ok){const e=await putRes.json();throw new Error(e.message||putRes.status);}
    setStatus("Сохранено ✓","ok");
  }catch(err){
    setStatus("Ошибка: "+err.message,"err");
  }finally{
    btn.disabled=false;
  }
}

render();
</script>
