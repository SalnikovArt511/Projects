<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks Board</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f7f7f5;
    --surface:  #ffffff;
    --surface2: #f1f0ec;
    --border:   rgba(55,53,47,0.12);
    --border2:  rgba(55,53,47,0.22);
    --text:     #37352f;
    --text2:    #787672;
    --text3:    #aeaca8;
    --radius:   8px;
    --check:    #2eaadc;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #191919;
      --surface:  #252525;
      --surface2: #2f2f2f;
      --border:   rgba(255,255,255,0.1);
      --border2:  rgba(255,255,255,0.2);
      --text:     #e6e6e3;
      --text2:    #9b9a97;
      --text3:    #6b6968;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px 16px 40px;
    min-height: 100vh;
  }

  /* ── header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header-title { font-size: 20px; font-weight: 600; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all .15s;
  }
  .filter-btn:hover { border-color: var(--text3); color: var(--text); }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* ── board ── */
  .board {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    overflow-x: auto;
    padding-bottom: 10px;
  }

  /* ── column ── */
  .col {
    flex: 0 0 240px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px;
    min-width: 0;
  }
  .col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding: 0 2px;
  }
  .col-title { font-size: 12px; font-weight: 600; color: var(--text2); }
  .col-badge {
    font-size: 11px;
    background: rgba(55,53,47,0.08);
    color: var(--text3);
    border-radius: 10px;
    padding: 1px 7px;
  }
  @media (prefers-color-scheme: dark) {
    .col-badge { background: rgba(255,255,255,0.07); }
  }

  /* ── card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    border-radius: var(--radius);
    padding: 11px 12px;
    margin-bottom: 7px;
    transition: box-shadow .15s;
  }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card[data-priority="high"]   { border-left-color: #e03e3e; }
  .card[data-priority="medium"] { border-left-color: #d9730d; }
  .card[data-priority="low"]    { border-left-color: #9b9a97; }

  .card-name {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 7px;
    color: var(--text);
  }
  .col[data-status="done"] .card-name {
    text-decoration: line-through;
    color: var(--text3);
  }

  .card-meta {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 10px;
    align-items: center;
  }

  /* ── pills ── */
  .pill {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
    font-weight: 500;
  }
  .pill-high   { background: #fbe4e4; color: #9b1c1c; }
  .pill-medium { background: #faebdd; color: #7a3a00; }
  .pill-low    { background: #f1f0ec; color: #6b6968; }
  .pill-dl     { background: var(--surface2); color: var(--text2); font-weight: 400; }
  .pill-dl.hot { background: #fbe4e4; color: #9b1c1c; }
  @media (prefers-color-scheme: dark) {
    .pill-high   { background: #3d1515; color: #f98989; }
    .pill-medium { background: #3a2000; color: #f5a05a; }
    .pill-low    { background: #2f2f2f; color: #9b9a97; }
    .pill-dl.hot { background: #3d1515; color: #f98989; }
  }

  /* ── subtasks ── */
  .subtasks-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0 0 8px;
  }
  .progress-bar-wrap {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: #2eaadc;
    border-radius: 2px;
    transition: width .3s ease;
  }
  .progress-label {
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .sub {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    padding: 3px 0;
    cursor: pointer;
    user-select: none;
  }
  .sub:hover .sub-text { color: var(--text); }

  .checkbox {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    background: transparent;
  }
  .checkbox.checked {
    background: var(--check);
    border-color: var(--check);
  }
  .checkbox.checked::after {
    content: '';
    display: block;
    width: 4px;
    height: 7px;
    border: 1.5px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }

  .sub-right { flex: 1; display: flex; align-items: flex-start; justify-content: space-between; gap: 4px; }
  .sub-text {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.4;
    transition: all .15s;
  }
  .sub-text.done {
    text-decoration: line-through;
    color: var(--text3);
  }
  .sub-owner {
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
    flex-shrink: 0;
    padding-top: 2px;
  }

  /* ── hidden card ── */
  .card.hidden { display: none; }

  /* ── empty col ── */
  .col-empty {
    font-size: 12px;
    color: var(--text3);
    text-align: center;
    padding: 16px 0 8px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Tasks</div>
  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Все</button>
    <button class="filter-btn" data-filter="Manager"   onclick="setFilter('Manager')">Руководитель</button>
    <button class="filter-btn" data-filter="Assistant" onclick="setFilter('Assistant')">Ассистент</button>
    <button class="filter-btn" data-filter="Both"      onclick="setFilter('Both')">Совместно</button>
  </div>
</div>

<div class="board" id="board"></div>

<script>
/* ═══════════════════════════════════════════
   ДАННЫЕ — редактируй здесь
   status: "inprogress" | "thisweek" | "inbox" | "done"
   priority: "high" | "medium" | "low"
   owner: "Manager" | "Assistant" | "Both"
═══════════════════════════════════════════ */
const TASKS = [
  {
    id: 1,
    name: "Создать презентацию (short + long version)",
    priority: "high",
    deadline: "27 мар",
    deadlineHot: true,
    status: "thisweek",
    owner: "Assistant",
    subs: [
      { id: 11, text: "Выбрать дизайнера",                    done: true,  owner: "Ast"  },
      { id: 12, text: "Согласовать условия и отдать в работу", done: true,  owner: "Ast"  },
      { id: 13, text: "Утвердить финальную версию",            done: false, owner: "Both" },
    ]
  },
  {
    id: 2,
    name: "Аутрич для клиентов (сегмент А/B)",
    priority: "high",
    deadline: "29 мар",
    deadlineHot: true,
    status: "thisweek",
    owner: "Assistant",
    subs: [
      { id: 21, text: "Анализ Озон Фарма + промпт для анализа", done: true,  owner: "Ast"  },
      { id: 22, text: "Структура аутрича Озон Фарма + промпт",  done: true,  owner: "Ast"  },
      { id: 23, text: "Ветки по компаниям в Claude + Диск",     done: true,  owner: "Ast"  },
      { id: 24, text: "Письма под Амедарт",                     done: true,  owner: "Ast"  },
      { id: 25, text: "Найти контакты ЛПР",                     done: false, owner: "Both" },
    ]
  },
  {
    id: 3,
    name: "AI-система для планирования",
    priority: "medium",
    deadline: "4 апр",
    deadlineHot: false,
    status: "thisweek",
    owner: "Assistant",
    subs: [
      { id: 31, text: "Выбрать структуру системы",        done: true,  owner: "Ast"  },
      { id: 32, text: "Создать бэклог",                   done: true,  owner: "Ast"  },
      { id: 33, text: "Настроить ТГ бот + Notion",        done: false, owner: "Ast"  },
      { id: 34, text: "Подключить Reclaim.ai",            done: false, owner: "Ast"  },
      { id: 35, text: "Протестировать полный цикл",       done: false, owner: "Both" },
    ]
  },
  {
    id: 4,
    name: "Сделать шаблон NDA",
    priority: "high",
    deadline: "25 мар",
    deadlineHot: true,
    status: "inprogress",
    owner: "Assistant",
    subs: []
  },
];

const COLS = [
  { key: "inprogress", label: "🔄 In progress" },
  { key: "thisweek",   label: "✅ This week"   },
  { key: "inbox",      label: "📥 Inbox"       },
  { key: "done",       label: "✔ Done"         },
];

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const state = {};
TASKS.forEach(t => {
  state[`task_${t.id}`] = t.status;
  t.subs.forEach(s => { state[`sub_${s.id}`] = s.done; });
});

let currentFilter = "all";

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function pillHtml(priority) {
  const labels = { high: "High", medium: "Medium", low: "Low" };
  return `<span class="pill pill-${priority}">${labels[priority]}</span>`;
}

function cardVisible(task) {
  if (currentFilter === "all") return true;
  if (currentFilter === "Both") return task.owner === "Both";
  return task.owner === currentFilter || task.owner === "Both";
}

function renderCard(task) {
  const status   = state[`task_${task.id}`];
  const visible  = cardVisible(task) ? "" : " hidden";
  const doneCol  = status === "done";

  // subtasks
  const total   = task.subs.length;
  const checked = task.subs.filter(s => state[`sub_${s.id}`]).length;
  const pct     = total ? Math.round(checked / total * 100) : 0;

  const subsHtml = task.subs.map(s => {
    const isDone = state[`sub_${s.id}`];
    return `<div class="sub" onclick="toggleSub(${s.id})">
      <div class="checkbox${isDone ? " checked" : ""}"></div>
      <div class="sub-right">
        <span class="sub-text${isDone ? " done" : ""}">${s.text}</span>
        <span class="sub-owner">${s.owner}</span>
      </div>
    </div>`;
  }).join("");

  const progressHtml = total ? `
    <div class="progress-label">
      <span>${checked}/${total} выполнено</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>` : "";

  const divider = total ? `<hr class="subtasks-divider">` : "";

  return `<div class="card${visible}" data-task="${task.id}" data-priority="${task.priority}">
    <div class="card-name">${task.name}</div>
    <div class="card-meta">
      ${pillHtml(task.priority)}
      ${task.deadline
        ? `<span class="pill pill-dl${task.deadlineHot ? " hot" : ""}">📅 ${task.deadline}</span>`
        : ""}
    </div>
    ${divider}
    ${progressHtml}
    ${subsHtml}
  </div>`;
}

function render() {
  const board = document.getElementById("board");
  board.innerHTML = COLS.map(col => {
    const tasks = TASKS.filter(t => state[`task_${t.id}`] === col.key);
    const visibleCount = tasks.filter(cardVisible).length;

    const cardsHtml = tasks.map(renderCard).join("") ||
      `<div class="col-empty">Нет задач</div>`;

    return `<div class="col" data-status="${col.key}">
      <div class="col-header">
        <span class="col-title">${col.label}</span>
        <span class="col-badge">${visibleCount}</span>
      </div>
      ${cardsHtml}
    </div>`;
  }).join("");
}

/* ═══════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════ */
function toggleSub(id) {
  state[`sub_${id}`] = !state[`sub_${id}`];
  render();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.filter === f);
  });
  render();
}

render();
</script>
</body>
</html>
